<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Menu Bánh Su Kem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍰 Cửa Hàng Bánh Su Kem</h1>
</header>

<!-- Thanh tìm kiếm -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm kiếm loại bánh...">
</div>

<!-- Bộ lọc -->
<div class="filters">
    <div class="filter-section">
        <label>Giá từ:</label>
        <input type="number" id="minPrice" value="0">k
    </div>

    <div class="filter-section">
        <label>Đến:</label>
        <input type="number" id="maxPrice" value="100">k
    </div>

    <div class="filter-section">
        <label>Bắt đầu bằng:</label>
        <select id="letterFilter">
            <option value="all">Tất cả</option>
            <script>
                for (let c = 65; c <= 90; c++) {
                    document.write(`<option value="${String.fromCharCode(c)}">${String.fromCharCode(c)}</option>`);
                }
            </script>
        </select>
    </div>

</div>

<!-- Danh sách bánh -->
<div class="menu" id="menuList"></div>

<footer>
    <h3>Thông Tin Cửa Hàng</h3>
    <p>📞 SĐT: 0901 234 567</p>
    <p>🏠 Địa chỉ: 123 Lê Lợi, TP. Hồ Chí Minh</p>
    <p>🕒 Giờ mở cửa: 8:00 - 21:00</p>
</footer>

<script src="script.js"></script>
</body>
</html>
